<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — SecureVote</title>
    <meta name="description" content="Sign in to your SecureVote account to cast your vote securely.">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="fade-in">
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="navbar-brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z"/></svg>
                </div>
                SecureVote
            </a>
            <div class="navbar-nav">
                <a href="register.html" class="nav-link">Register</a>
            </div>
        </div>
    </nav>

    <main class="main-content container">
        <div class="card auth-card">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p class="subtitle">Sign in to access your voter dashboard</p>
                <div class="trust-badge">
                    <svg style="width:14px;height:14px;" viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                    256-bit Encrypted Session
                </div>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="name@example.com" autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••" autocomplete="current-password">
                </div>

                <div class="form-actions">
                    <button type="submit" id="login-btn" class="btn btn-primary btn-block">Sign In</button>
                    <a href="register.html" class="btn btn-secondary btn-block">Create an account</a>
                </div>
            </form>

            <div id="loading" class="loading" style="display:none;">
                <div class="spinner"></div> Authenticating...
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <span>&copy; 2026 SecureVote</span>
        </div>
    </footer>

    <script src="components/auth.js"></script>
    <script src="components/toast.js"></script>
    <script src="login.js"></script>
</body>
</html>
