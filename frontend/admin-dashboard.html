<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - SecureVote</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="admin-styles.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <a href="#" class="navbar-brand">
                    <svg viewBox="0 0 24 24" fill="currentColor" style="width: 24px; height: 24px;"><path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z"/></svg>
                    SecureVote
                </a>
            </div>
            
            <nav class="sidebar-nav tabs">
                <button class="tab-btn active" data-tab="stats">
                    <svg style="width:20px;" viewBox="0 0 24 24" fill="currentColor"><path d="M3 3h18v2H3V3zm0 16h18v2H3v-2zm0-8h18v2H3v-2zm4 4h10v-2H7v2zm0-8h10V5H7v2z"/></svg>
                    Statistics
                </button>
                <button class="tab-btn" data-tab="candidates">
                    <svg style="width:20px;" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                    Candidates
                </button>
                <button class="tab-btn" data-tab="voters">
                    <svg style="width:20px;" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    Voters
                </button>
                <button class="tab-btn" data-tab="votes">
                    <svg style="width:20px;" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                    Votes Cast
                </button>
                <button class="tab-btn" data-tab="results">
                    <svg style="width:20px;" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 9h-2V7h2v5zm4 0h-2V9h2v3zm-8 0H6v-2h2v2zm8 4H6v-2h12v2z"/></svg>
                    Results
                </button>
            </nav>

            <div class="sidebar-footer">
                <span class="admin-name" id="admin-name">Admin: username</span>
                <button id="logout-btn" class="logout-btn">Log Out Sequence</button>
            </div>
        </aside>

        <main class="admin-main">
            <header class="admin-header">
                <h1>Control Panel</h1>
                <div id="loading" class="loading" style="display: none; padding: 0;">
                    <div class="spinner"></div>
                </div>
            </header>

            <div class="admin-content-wrapper">
                <div id="error-message" class="alert alert-error" style="display: none;"></div>
                <div id="success-message" class="alert alert-success" style="display: none;"></div>

                <div class="tab-content">

                    <div id="stats-tab" class="tab-pane active">
                        <h2>Election Statistics</h2>
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-value" id="stat-voters">-</div>
                                <div class="stat-label">Total Voters</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value" id="stat-votes">-</div>
                                <div class="stat-label">Votes Cast</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value" id="stat-turnout">-</div>
                                <div class="stat-label">Turnout</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value" id="stat-candidates">-</div>
                                <div class="stat-label">Candidates</div>
                            </div>
                        </div>
                        <button id="refresh-stats-btn" class="btn btn-primary">
                            <svg style="width:16px; margin-right:8px;" viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg> 
                            Refresh Data
                        </button>
                    </div>

                    <div id="candidates-tab" class="tab-pane">
                        <h2>Manage Candidates</h2>
                        <div class="form-section">
                            <h3>Add New Candidate</h3>
                            <form id="add-candidate-form">
                                <div class="form-row">
                                    <div class="form-group" style="margin-bottom: 0;">
                                        <label for="candidate_name">Candidate Name</label>
                                        <input type="text" id="candidate_name" class="form-control" placeholder="Jane Doe" required>
                                    </div>
                                    <div class="form-group" style="margin-bottom: 0;">
                                        <label for="party_name">Party Name</label>
                                        <input type="text" id="party_name" class="form-control" placeholder="Independent Party" required>
                                    </div>
                                    <div class="form-group" style="margin-bottom: 0;">
                                        <label for="symbol">Symbol (emoji)</label>
                                        <input type="text" id="symbol" class="form-control" placeholder="👤">
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-primary" style="margin-top: var(--spacing-4);">Add to Roster</button>
                            </form>
                        </div>
                        
                        <div class="table-container" id="candidates-list">
                        </div>
                    </div>

                    <div id="voters-tab" class="tab-pane">
                        <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                            <h2>Registered Voters</h2>
                            <p style="color:var(--color-text-muted); font-weight:600;">Total Records: <span id="voters-count" style="color:var(--color-primary);">0</span></p>
                        </div>
                        <div class="table-container" id="voters-list">
                        </div>
                    </div>

                    <div id="votes-tab" class="tab-pane">
                        <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                            <h2>Votes Cast Ledger</h2>
                            <p style="color:var(--color-text-muted); font-weight:600;">Total Votes: <span id="votes-count" style="color:var(--color-primary);">0</span></p>
                        </div>
                        <div class="table-container" id="votes-list">
                        </div>
                    </div>

                    <div id="results-tab" class="tab-pane">
                        <h2>Election Results</h2>
                        <div class="form-section" id="results-list">
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="admin-dashboard.js"></script>
</body>
</html>
