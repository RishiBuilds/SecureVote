<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — SecureVote</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="admin-styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <a href="index.html" class="navbar-brand">
                    <div class="brand-icon">
                        <svg viewBox="0 0 24 24"><path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z"/></svg>
                    </div>
                    <span>SecureVote</span>
                </a>
            </div>

            <nav class="sidebar-nav">
                <button class="tab-btn active" data-tab="overview">
                    <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                    <span>Overview</span>
                </button>
                <button class="tab-btn" data-tab="elections">
                    <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                    <span>Elections</span>
                </button>
                <button class="tab-btn" data-tab="candidates">
                    <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                    <span>Candidates</span>
                </button>
                <button class="tab-btn" data-tab="results">
                    <svg viewBox="0 0 24 24"><path d="M5 9.2h3V19H5zM10.6 5h2.8v14h-2.8zm5.6 8H19v6h-2.8z"/></svg>
                    <span>Results</span>
                </button>
                <button class="tab-btn" data-tab="voters">
                    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    <span>Voters</span>
                </button>
                <button class="tab-btn" data-tab="votes">
                    <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13z"/></svg>
                    <span>Vote Ledger</span>
                </button>
                <button class="tab-btn" data-tab="fraud">
                    <svg viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>
                    <span>Fraud Alerts</span>
                </button>
                <button class="tab-btn" data-tab="audit">
                    <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                    <span>Audit Logs</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <span class="admin-name" id="admin-name">Admin</span>
                <button id="logout-btn" class="logout-btn">Sign Out</button>
            </div>
        </aside>

        <main class="admin-main">
            <header class="admin-header">
                <h1 id="page-title">Overview</h1>
                <div id="loading" class="loading" style="display:none; padding:0;">
                    <div class="spinner"></div>
                </div>
            </header>

            <div class="admin-content-wrapper">

                
                <div id="overview-tab" class="tab-pane active">
                    <div class="stats-grid" id="stats-grid"></div>
                    <div class="form-section">
                        <h3>Quick Actions</h3>
                        <div style="display: flex; gap: var(--spacing-3); flex-wrap: wrap;">
                            <button class="btn btn-primary btn-sm" onclick="switchTab('elections')">Manage Elections</button>
                            <button class="btn btn-secondary btn-sm" onclick="switchTab('candidates')">Add Candidates</button>
                            <button class="btn btn-secondary btn-sm" onclick="switchTab('results')">View Results</button>
                            <button class="btn btn-secondary btn-sm" onclick="switchTab('fraud')">Fraud Alerts</button>
                        </div>
                    </div>
                </div>

                
                <div id="elections-tab" class="tab-pane">
                    <div class="form-section">
                        <h3>Create New Election</h3>
                        <form id="create-election-form">
                            <div class="form-row">
                                <div class="form-group" style="margin-bottom:0;">
                                    <label for="election_title">Title</label>
                                    <input type="text" id="election_title" class="form-control" placeholder="e.g. Student Council 2026" required>
                                </div>
                                <div class="form-group" style="margin-bottom:0;">
                                    <label for="election_desc">Description</label>
                                    <input type="text" id="election_desc" class="form-control" placeholder="Brief description">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary btn-sm" style="margin-top: var(--spacing-4);">Create Election</button>
                        </form>
                    </div>
                    <div id="elections-list"></div>
                </div>

                
                <div id="candidates-tab" class="tab-pane">
                    <div class="form-section">
                        <h3>Add Candidate</h3>
                        <form id="add-candidate-form">
                            <div class="form-row">
                                <div class="form-group" style="margin-bottom:0;">
                                    <label for="cand_election">Election</label>
                                    <select id="cand_election" class="form-control" required>
                                        <option value="">Select election</option>
                                    </select>
                                </div>
                                <div class="form-group" style="margin-bottom:0;">
                                    <label for="cand_name">Name</label>
                                    <input type="text" id="cand_name" class="form-control" placeholder="Jane Doe" required>
                                </div>
                                <div class="form-group" style="margin-bottom:0;">
                                    <label for="cand_party">Party</label>
                                    <input type="text" id="cand_party" class="form-control" placeholder="Independent" required>
                                </div>
                                <div class="form-group" style="margin-bottom:0;">
                                    <label for="cand_symbol">Symbol</label>
                                    <input type="text" id="cand_symbol" class="form-control" placeholder="🌊" value="👤">
                                </div>
                            </div>
                            <div class="form-group" style="margin-top: var(--spacing-3);">
                                <label for="cand_desc">Description</label>
                                <input type="text" id="cand_desc" class="form-control" placeholder="Brief bio or platform">
                            </div>
                            <button type="submit" class="btn btn-primary btn-sm">Add Candidate</button>
                        </form>
                    </div>
                    <div class="table-container" id="candidates-list"></div>
                </div>

                
                <div id="results-tab" class="tab-pane">
                    <div style="margin-bottom: var(--spacing-4); display: flex; align-items: center; gap: var(--spacing-3);">
                        <label style="font-weight: 600; font-size: 0.9rem;">Election:</label>
                        <select id="results-election" class="form-control" style="max-width: 300px;"></select>
                    </div>
                    <div class="form-section" id="results-content">
                        <div class="empty-state"><h3>Select an election to view results</h3></div>
                    </div>
                    <div class="chart-container" style="max-width: 500px;">
                        <canvas id="admin-results-chart"></canvas>
                    </div>
                    <div class="form-section" style="margin-top: var(--spacing-4);">
                        <h3>Chain Integrity</h3>
                        <button id="verify-chain-btn" class="btn btn-secondary btn-sm">Verify Vote Chain</button>
                        <div id="chain-result" style="margin-top: var(--spacing-3);"></div>
                    </div>
                </div>

                
                <div id="voters-tab" class="tab-pane">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: var(--spacing-4);">
                        <h2 style="font-size: 1.1rem;">Registered Voters</h2>
                        <span class="badge badge-info" id="voters-count">0</span>
                    </div>
                    <div class="table-container" id="voters-list"></div>
                </div>

                
                <div id="votes-tab" class="tab-pane">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: var(--spacing-4);">
                        <h2 style="font-size: 1.1rem;">Vote Ledger</h2>
                        <span class="badge badge-info" id="votes-count">0</span>
                    </div>
                    <div class="table-container" id="votes-list"></div>
                </div>

                
                <div id="fraud-tab" class="tab-pane">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: var(--spacing-4);">
                        <h2 style="font-size: 1.1rem;">Fraud Alerts</h2>
                        <span class="badge badge-error" id="fraud-count">0</span>
                    </div>
                    <div class="table-container" id="fraud-list"></div>
                </div>

                
                <div id="audit-tab" class="tab-pane">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: var(--spacing-4);">
                        <h2 style="font-size: 1.1rem;">Audit Trail</h2>
                        <span class="badge badge-neutral" id="audit-count">0</span>
                    </div>
                    <div class="table-container" id="audit-list"></div>
                </div>

            </div>
        </main>
    </div>

    <script src="components/auth.js"></script>
    <script src="components/toast.js"></script>
    <script src="admin-dashboard.js"></script>
</body>
</html>
