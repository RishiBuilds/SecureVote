<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - SecureVote</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="fade-in" style="background-color: #0f172a;">
    <nav class="navbar" style="background: rgba(15, 23, 42, 0.95); border-bottom: 1px solid #1e293b;">
        <div class="container">
            <a href="index.html" class="navbar-brand" style="color: white;">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z"/></svg>
                SecureVote <span style="font-weight: 400; font-size: 0.9em; margin-left:8px; opacity:0.8; letter-spacing:1px; text-transform:uppercase;">Admin</span>
            </a>
            <div class="navbar-nav">
                <a href="index.html" class="nav-link" style="color: #cbd5e1;">Return Home</a>
            </div>
        </div>
    </nav>

    <main class="main-content container">
        <div class="card auth-card" style="border-top: 4px solid var(--color-error); background: #1e293b; border-color: #334155; color: white;">
            <div class="auth-header">
                <h1 style="color: white;">Administrator Portal</h1>
                <p class="subtitle" style="color: #94a3b8;">Elevated access required</p>
                <div class="trust-badge" style="background: rgba(239, 68, 68, 0.2); color: #fca5a5;">
                    <svg style="width: 14px; height: 14px;" viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                    Restricted Area
                </div>
            </div>

            <div id="error-message" class="alert alert-error" style="display: none;"></div>

            <form id="admin-login-form">
                <div class="form-group">
                    <label for="username" style="color: #cbd5e1;">Admin Username</label>
                    <input type="text" id="username" name="username" class="form-control" style="background:#0f172a; color:white; border-color: #475569;" required placeholder="admin">
                </div>

                <div class="form-group">
                    <label for="password" style="color: #cbd5e1;">Password</label>
                    <input type="password" id="password" name="password" class="form-control" style="background:#0f172a; color:white; border-color: #475569;" required placeholder="••••••••">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-block" style="background: #ef4444; color: white;">Authenticate Session</button>
                </div>
            </form>

            <div id="loading" class="loading" style="display: none; color: #cbd5e1;">
                <div class="spinner" style="border-top-color: #ef4444;"></div> Authenticating...
            </div>
        </div>
    </main>

    <footer style="border-top-color: #1e293b;">
        <div class="container" style="justify-content: center;">
            <span style="color: #64748b;">&copy; 2026 SecureVote · Admin Systems</span>
        </div>
    </footer>

    <script src="admin-login.js"></script>
</body>
</html>
