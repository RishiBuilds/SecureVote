<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — SecureVote</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background: #0F172A; }
        .navbar { background: rgba(15, 23, 42, 0.95); border-bottom-color: rgba(255,255,255,0.06); }
        .navbar-brand { color: white; }
        .auth-card { background: #1E293B; border-color: rgba(255,255,255,0.08); }
        .auth-card h1 { color: white; }
        .auth-card .subtitle { color: #94A3B8; }
        .form-group label { color: #CBD5E1; }
        .form-control { background: #0F172A; border-color: rgba(255,255,255,0.1); color: white; }
        .form-control::placeholder { color: #475569; }
        .form-control:focus { border-color: var(--color-accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
        footer { border-top-color: rgba(255,255,255,0.06); }
        footer span { color: #475569; }
        .trust-badge { background: rgba(99,102,241,0.15); color: #A5B4FC; }
    </style>
</head>
<body class="fade-in">
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="navbar-brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z"/></svg>
                </div>
                SecureVote
            </a>
            <div class="navbar-nav">
                <a href="login.html" class="nav-link" style="color:#94A3B8;">Voter Login</a>
            </div>
        </div>
    </nav>

    <main class="main-content container">
        <div class="card auth-card">
            <div class="auth-header">
                <h1>Admin Access</h1>
                <p class="subtitle">Sign in to the administration panel</p>
                <div class="trust-badge">
                    <svg style="width:14px;height:14px;" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
                    Privileged Access Portal
                </div>
            </div>

            <form id="admin-login-form">
                <div class="form-group">
                    <label for="email">Admin Email</label>
                    <input type="email" id="email" class="form-control" required placeholder="admin@securevote.io" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••" autocomplete="current-password">
                </div>
                <div class="form-actions">
                    <button type="submit" id="login-btn" class="btn btn-primary btn-block">Sign In as Admin</button>
                </div>
            </form>

            <div id="loading" class="loading" style="display:none;">
                <div class="spinner"></div> <span style="color:#94A3B8;">Authenticating...</span>
            </div>
        </div>
    </main>

    <footer>
        <div class="container"><span>&copy; 2026 SecureVote</span></div>
    </footer>

    <script src="components/auth.js"></script>
    <script src="components/toast.js"></script>
    <script src="admin-login.js"></script>
</body>
</html>
